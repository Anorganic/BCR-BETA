<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAINTENANCE BCR</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#3d1c28">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BCR Maintenance">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">⚙</div>
    <h1>MAINTENANCE BCR</h1>
    <p class="login-sub">Asset &amp; Work Management</p>
    <div class="form-row"><label>Email</label><input type="email" id="login_email" placeholder="nama@perusahaan.com" autocomplete="username"></div>
    <div class="form-row"><label>Password</label><input type="password" id="login_password" placeholder="••••••••" autocomplete="current-password"></div>
    <div id="loginError" class="login-error" style="display:none"></div>
    <button class="btn btn-primary" id="btnLogin" style="width:100%">Masuk</button>
    <div class="login-hint">Belum punya akun? Hubungi admin untuk dibuatkan akses.</div>
  </div>
</div>

<div id="app" style="display:none">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">⚙</div>
      <div class="name">MAINTENANCE BCR<small>ASSET &amp; WORK MANAGEMENT</small></div>
    </div>
    <nav class="menu" id="menu"></nav>
    <div class="sidebar-foot">© 2026 MAINTENANCE BCR · v1.0</div>
  </aside>

  <div id="main">
    <header id="topbar">
      <button class="hamburger" id="btnHamburger" aria-label="Buka menu">☰</button>
      <div>
        <div class="crumb" id="crumb">Dashboard</div>
        <h1 id="pageTitle">Dashboard</h1>
      </div>
      <div class="spacer"></div>
      <div class="sync-status" id="syncStatus" title="Status koneksi backend">
        <span class="dot"></span><span class="txt">Memuat...</span>
      </div>
      <button class="btn btn-secondary btn-sm" id="btnRefresh" title="Ambil data terbaru">⟳ Refresh</button>
      <div class="searchbox"><input id="globalSearch" placeholder="Cari asset, WR, WO..."></div>
      <div class="avatar" id="avatarBtn" title="Akun saya">A</div>
    </header>
    <main id="content"></main>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
